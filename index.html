<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интернет-магазин</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Добро пожаловать в наш интернет-магазин!</h1>
    <div id="products">
        <!-- Здесь можно динамически добавлять товары -->
    </div>
    <script>
        // Использование Telegram Web App API
        const tg = window.Telegram.WebApp;

        // Пример динамической загрузки товаров
        const products = [
            { name: "Товар 1", price: 100 },
            { name: "Товар 2", price: 200 },
            { name: "Товар 3", price: 300 },
        ];

        products.forEach(product => {
            const productElement = document.createElement('div');
            productElement.textContent = \${product.name} - ${product.price} ₽\;
            document.getElementById('products').appendChild(productElement);
        });

        // Передача данных обратно в бота по нажатию
        function buyProduct(productName) {
            tg.sendData(productName);
        }
    </script>
</body>
</html>
